services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: stock-timescaledb
    environment:
      POSTGRES_DB: ${DB_NAME:-stocks}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-stocks}"]
      interval: 5s
      timeout: 5s
      retries: 5

  stock-fetcher:
    build:
      context: ./fetcher
      dockerfile: Dockerfile
    container_name: stock-fetcher
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-stocks}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      UPDATE_CRON: ${UPDATE_CRON:-0 23 * * *}
      YFINANCE_CHUNK_SIZE: ${YFINANCE_CHUNK_SIZE:-50}
      YFINANCE_DELAY_SEC: ${YFINANCE_DELAY_SEC:-2.5}
      HISTORICAL_START: ${HISTORICAL_START:-2020-01-01}
    depends_on:
      timescaledb:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: stock-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_INSTALL_PLUGINS: ""
      # Datasource provisioning via env vars (connects to TimescaleDB)
      GF_DATASOURCES_DEFAULT_ENABLED: "true"
      GF_DATASOURCES_DEFAULT_NAME: TimescaleDB
      GF_DATASOURCES_DEFAULT_TYPE: postgres
      GF_DATASOURCES_DEFAULT_URL: timescaledb:5432
      GF_DATASOURCES_DEFAULT_USER: ${DB_USER:-postgres}
      GF_DATASOURCES_DEFAULT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      GF_DATASOURCES_DEFAULT_DATABASE: ${DB_NAME:-stocks}
      GF_DATASOURCES_DEFAULT_IS_DEFAULT: "true"
      GF_DATASOURCES_DEFAULT_JSON_DATA: '{"sslmode":"disable","postgresVersion":1700,"timescaledb":true}'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - timescaledb

volumes:
  timescaledb_data:
  grafana_data:
