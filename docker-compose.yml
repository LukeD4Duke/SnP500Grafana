services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: stock-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-stocks}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    # Keep PostgreSQL internal to the stack on the home server.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-stocks}"]
      interval: 5s
      timeout: 5s
      retries: 5

  stock-fetcher:
    build:
      context: .
      dockerfile: fetcher/Dockerfile
    container_name: stock-fetcher
    restart: unless-stopped
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-stocks}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      UPDATE_CRON: ${UPDATE_CRON:-0 23 * * *}
      YFINANCE_CHUNK_SIZE: ${YFINANCE_CHUNK_SIZE:-50}
      YFINANCE_SYMBOL_RETRIES: ${YFINANCE_SYMBOL_RETRIES:-2}
      YFINANCE_EMPTY_RESPONSE_RETRIES: ${YFINANCE_EMPTY_RESPONSE_RETRIES:-0}
      YFINANCE_RECOVERY_CHUNK_SIZE: ${YFINANCE_RECOVERY_CHUNK_SIZE:-5}
      YFINANCE_FAILED_SYMBOL_LOG_LIMIT: ${YFINANCE_FAILED_SYMBOL_LOG_LIMIT:-20}
      YFINANCE_DELAY_SEC: ${YFINANCE_DELAY_SEC:-2.5}
      HISTORICAL_START: ${HISTORICAL_START:-2020-01-01}
      BACKFILL_START: ${BACKFILL_START:-}
      STARTUP_POST_SYNC_MODE: ${STARTUP_POST_SYNC_MODE:-background}
      STARTUP_BACKFILL_MODE: ${STARTUP_BACKFILL_MODE:-background}
      FETCHER_STATUS_PORT: ${FETCHER_STATUS_PORT:-8080}
      INDICATORS_ENABLED: ${INDICATORS_ENABLED:-true}
      INDICATOR_INCREMENTAL_LOOKBACK_ROWS: ${INDICATOR_INCREMENTAL_LOOKBACK_ROWS:-1000}
      INDICATOR_REBUILD_ON_STARTUP: ${INDICATOR_REBUILD_ON_STARTUP:-false}
      INDICATOR_BATCH_SIZE: ${INDICATOR_BATCH_SIZE:-25}
      ANALYTICS_ENABLED: ${ANALYTICS_ENABLED:-true}
      ANALYTICS_TIMEFRAMES: ${ANALYTICS_TIMEFRAMES:-daily,weekly,monthly}
      REPORTS_ENABLED: ${REPORTS_ENABLED:-true}
      REPORT_OUTPUT_DIR: ${REPORT_OUTPUT_DIR:-/app/reports}
      REPORT_WEEKLY_CRON: ${REPORT_WEEKLY_CRON:-15 0 * * 1}
      REPORT_MONTHLY_CRON: ${REPORT_MONTHLY_CRON:-30 0 1 * *}
    volumes:
      - ./reports:/app/reports
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; port=os.environ.get('FETCHER_STATUS_PORT','8080'); urllib.request.urlopen(f'http://127.0.0.1:{port}/readyz', timeout=5)"
        ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    depends_on:
      timescaledb:
        condition: service_healthy

  grafana:
    build:
      context: .
      dockerfile: grafana/Dockerfile
    container_name: stock-grafana
    restart: unless-stopped
    environment:
      DB_NAME: ${DB_NAME:-stocks}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_DOMAIN: ${GRAFANA_HOST:-localhost}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_RENDERING_SERVER_URL: http://grafana-image-renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      # Publish Grafana on the local loopback by default; override for remote access.
      - "${GRAFANA_BIND_IP:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - timescaledb
      - grafana-image-renderer

  report-service:
    build:
      context: .
      dockerfile: fetcher/Dockerfile
    container_name: stock-report-service
    restart: unless-stopped
    entrypoint: ["python", "-m", "uvicorn", "src.report_service:app", "--host", "0.0.0.0", "--port", "3000"]
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-stocks}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      REPORT_OUTPUT_DIR: ${REPORT_OUTPUT_DIR:-/app/reports}
      REPORT_UI_PUBLIC_URL: ${REPORT_UI_PUBLIC_URL:-http://localhost:3002}
      GRAFANA_INTERNAL_URL: ${GRAFANA_INTERNAL_URL:-http://grafana:3000}
    volumes:
      - ./reports:/app/reports
    ports:
      - "${REPORT_UI_BIND_IP:-127.0.0.1}:${REPORT_UI_PORT:-3002}:3000"
    depends_on:
      - timescaledb
      - grafana

  grafana-image-renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: stock-grafana-image-renderer
    restart: unless-stopped
    environment:
      ENABLE_METRICS: "false"

volumes:
  timescaledb_data:
  grafana_data:
